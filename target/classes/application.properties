# Configuracion para H2 (Base de datos en archivo)
spring.datasource.url=jdbc:h2:file:./data/onepiece-db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Para que puedas ver la consola de la base de datos en el navegador
spring.h2.console.enabled=true

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# ================================================================================
# Configuracion OPDeckManager
# ================================================================================
# Importar cartas automáticamente al iniciar la aplicación
# true:  Importa todas las cartas desde GitHub al startup
# false: Requiere llamar manualmente al endpoint POST /api/import/all
opdeckmanager.auto-import.enabled=false

# Actuator para health checks
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health
